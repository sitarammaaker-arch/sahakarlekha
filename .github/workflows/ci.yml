name: CI

# Typecheck + the pure test suite on every PR and every push to main. The audit flagged that the
# ~90 test:* scripts existed but nothing ran them automatically — so a regression only surfaced if
# someone remembered to run them by hand. This makes them a gate. Deploys go through Vercel, not
# here, so a red run is advisory (it tells you a change broke a test) rather than blocking a deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24: the test:* scripts import real .ts source and rely on Node's native TypeScript
          # type-stripping (default-on in Node 23.6+/24). On Node 20 every such test fails to load.
          # Match the dev environment (local runs on Node 24).
          node-version: '24'
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        # The ROOT tsconfig.json has "files": [] (it only references the app/node projects), so a bare
        # `tsc --noEmit` checks NOTHING and passed while 12 real type errors sat in the app for months.
        # Point at the app project so this actually gates types. (`npm run typecheck` = the same.)
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Tests
        # Run every test:* script EXCEPT the ones that need a prior build artifact (dist / esbuild
        # bundles) — those belong in the build job, not the pure-logic gate. Collect failures so one
        # broken test doesn't hide the others, then fail the job listing them.
        # Excludes only dist/bundle — they need a prior build artifact and belong in a build job.
        run: |
          tests=$(node -e "const s=require('./package.json').scripts;console.log(Object.keys(s).filter(k=>k.startsWith('test:')&&!/dist|bundle/.test(k)).join(' '))")
          fails=""
          for t in $tests; do
            echo "::group::npm run $t"
            if npm run "$t"; then :; else fails="$fails $t"; fi
            echo "::endgroup::"
          done
          if [ -n "$fails" ]; then
            echo "::error::Failed test scripts:$fails"
            exit 1
          fi
          echo "All pure test suites passed."
